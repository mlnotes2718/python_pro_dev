# dev_environment.yml — all of prod + tooling
name: dev-pypro
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Runtime (keep in sync with environment.yml)
  - pandas
  - numpy
  - python-dotenv
  - requests
  - pyyaml
  - ipykernel
  - ipywidgets
  - matplotlib
  # Type stubs
  - pandas-stubs
  - types-requests
  - types-pyyaml
  # Testing
  - pytest
  - pytest-cov
  - hypothesis
  # Quality tools
  # Trivy installed separately
  - ruff
  - mypy
  - bandit
  - pre-commit
  - pip-audit
  # Task runner
  - just
  # Lock file management
  - conda-lock
  # Notebook Dev Tools
  - nbdime
